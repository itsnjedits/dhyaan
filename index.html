<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="description" content="Dhyaan — A living meditation experience. Immersive ambient soundscapes for deep focus, healing, and stillness." />

  <!-- PWA / Theme -->
  <meta name="theme-color" content="#0a0f0d" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#0a0f0d" />
  <meta name="color-scheme" content="dark" />

  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dhyaan" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
  <link rel="apple-touch-startup-image" href="/assets/icons/icon-512.png" />

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-96.png" />

  <!-- Open Graph -->
  <meta property="og:title" content="Dhyaan — A Living Meditation Experience" />
  <meta property="og:description" content="Immersive ambient soundscapes for deep focus, healing, and stillness." />
  <meta property="og:type" content="website" />

  <title>Dhyaan — A Living Meditation Experience</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" />

  <link rel="stylesheet" href="./css/main.css" />
</head>
<body data-theme="zen-dark">

<!-- Ambient canvas -->
<canvas id="particle-canvas" aria-hidden="true"></canvas>

<!-- Mobile sidebar backdrop -->
<div id="mobile-sidebar-backdrop" aria-hidden="true"></div>

<!-- ── Expand mode overlay ───────────────────────────────────────────────── -->
<!-- BUG-020 FIX: tabindex="-1" makes the element programmatically focusable
     so app.js's overlay.focus() call actually works. Without it, focus() on
     a non-interactive element silently fails, breaking keyboard/AT navigation
     when the immersive overlay opens. -->
<div id="expand-overlay" role="dialog" aria-label="Immersive player"
     aria-modal="true" aria-hidden="true" tabindex="-1">
  <img id="expand-image" src="" alt="Album art" draggable="false" />
  <div class="expand-gradient"></div>

  <button id="collapse-btn" aria-label="Exit immersive mode" title="Exit (Esc)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
  </button>

  <div class="expand-ui">
    <div class="expand-track-info">
      <div id="expand-title">―</div>
      <div id="expand-moods"></div>
    </div>

    <div class="expand-progress-wrap">
      <span class="expand-time" id="expand-current">0:00</span>
      <div class="expand-progress-bar" id="expand-progress-bar" role="slider"
           aria-label="Playback position" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div id="expand-filled"></div>
        <div id="expand-thumb" class="progress-thumb"></div>
      </div>
      <span class="expand-time" id="expand-duration">0:00</span>
    </div>

    <div class="expand-controls">
      <button class="expand-ctrl-btn" id="expand-prev" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button id="expand-play-btn" aria-label="Play / Pause">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="expand-ctrl-btn" id="expand-next" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>

    <div class="expand-swipe-hint">tap to show controls</div>

    <!-- Recommendations panel (injected by app.js) -->
  </div>
</div>

<!-- ── Main app ──────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Header -->
  <header id="header">
    <div class="logo" role="button" tabindex="0" aria-label="About Dhyaan">
      <span class="logo-glyph">☸</span>
      <span>Dhyaan</span>
    </div>

    <div class="header-controls">
      <!-- Search -->
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </span>
        <input id="search-input" type="search" placeholder="Search tracks, moods…"
               autocomplete="off" spellcheck="false" aria-label="Search tracks and moods"
               inputmode="search" enterkeyhint="search" />
        <button id="search-clear" aria-label="Clear search" title="Clear">✕</button>
      </div>

      <!-- Theme switcher (desktop) -->
      <div class="theme-switcher" aria-label="Theme selector" role="group">
        <div class="theme-dot" data-theme-btn="zen-dark"        title="Zen Dark"        role="button" tabindex="0" aria-label="Zen Dark theme"></div>
        <div class="theme-dot" data-theme-btn="night-blue"      title="Night Blue"       role="button" tabindex="0" aria-label="Night Blue theme"></div>
        <div class="theme-dot" data-theme-btn="cosmic-purple"   title="Cosmic Purple"    role="button" tabindex="0" aria-label="Cosmic Purple theme"></div>
        <div class="theme-dot" data-theme-btn="forest-calm"     title="Forest Calm"      role="button" tabindex="0" aria-label="Forest Calm theme"></div>
        <div class="theme-dot" data-theme-btn="spiritual-green" title="Spiritual Green"  role="button" tabindex="0" aria-label="Spiritual Green theme"></div>
        <div class="theme-dot" data-theme-btn="sunset-gold"     title="Sunset Gold"      role="button" tabindex="0" aria-label="Sunset Gold theme"></div>

        <div class="theme-dot" data-theme-btn="moonlight"       title="Moonlight Silver" role="button" tabindex="0" aria-label="Moonlight theme"></div>

      <div class="mobile-theme-label">Atmosphere</div>
      <div class="mobile-theme-grid">
        <!-- BUG-022 FIX: added role="button", tabindex="0", and aria-label to

        <div class="mobile-theme-item" data-theme-mobile="cosmic-purple"

        <div class="mobile-theme-item" data-theme-mobile="forest-calm"

        <div class="mobile-theme-item" data-theme-mobile="spiritual-green"
             role="button" tabindex="0" aria-label="Switch to Spiritual Green theme">
          <div class="mobile-theme-swatch" style="background:#6ee7b7"></div>
          <span class="mobile-theme-name">Spiritual</span>
        </div>
        <div class="mobile-theme-item" data-theme-mobile="sunset-gold"

          <div class="mobile-theme-swatch" style="background:#f59e0b"></div>
          <span class="mobile-theme-name">Sunset</span>
        </div>
        <div class="mobile-theme-item" data-theme-mobile="rose-pink"
             role="button" tabindex="0" aria-label="Switch to Rose Pink theme">
          <div class="mobile-theme-swatch" style="background:#f472b6"></div>
          <span class="mobile-theme-name">Rose</span>
        </div>
        <div class="mobile-theme-item" data-theme-mobile="moonlight"
             role="button" tabindex="0" aria-label="Switch to Moonlight theme">
          <div class="mobile-theme-swatch" style="background:#cbd5e1"></div>
          <span class="mobile-theme-name">Moonlight</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">
        <span>Playlists</span>
        <button id="new-playlist-btn" aria-label="New playlist">+ New</button>
      </div>
      <div id="playlists-container"></div>
    </div>
  </aside>

  <!-- Main content -->
  <main id="main">
    <div id="mood-pills" role="group" aria-label="Filter by mood"></div>
    <div id="track-list" role="list" aria-label="Meditation tracks">
      <div class="empty-state">Loading stillness…</div>
    </div>
  </main>

  <!-- Player bar -->
  <footer id="player" aria-label="Music player">
    <div class="player-top-row">
      <div class="np-info">
        <div class="np-thumb">
          <img id="np-image" src="" alt="Now playing" draggable="false" loading="lazy" />
        </div>
        <div class="np-text">
          <div id="np-title">Select a track</div>
          <div id="np-moods">―</div>
        </div>
      </div>
      <button class="player-expand-mobile mobile-only" id="expand-btn-mobile"
              aria-label="Immersive mode" title="Immersive mode">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>

    <div class="player-controls">
      <div class="ctrl-btns">
        <button class="ctrl-btn" id="shuffle-btn" aria-label="Shuffle" title="Shuffle">

        </button>
        <button class="ctrl-btn seek-btn desktop-only" id="seek-bwd" aria-label="Seek back 10s" title="−10s">

          <span>10</span>
        </button>
        <button class="ctrl-btn" id="prev-btn" aria-label="Previous track">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="play-pause-btn" aria-label="Play / Pause">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" id="next-btn" aria-label="Next track">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button class="ctrl-btn seek-btn desktop-only" id="seek-fwd" aria-label="Seek forward 10s" title="+10s">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
          <span>10</span>
        </button>
        <button class="ctrl-btn" id="repeat-btn" aria-label="Repeat" title="Repeat">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
        <button class="ctrl-btn" id="random-btn" aria-label="Random meditation" title="Random track">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="2.5"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8 0-1.85.63-3.55 1.69-4.9L16.9 18.31C15.55 19.37 13.85 20 12 20zm6.31-3.1L7.1 5.69C8.45 4.63 10.15 4 12 4c4.42 0 8 3.58 8 8 0 1.85-.63 3.55-1.69 4.9z"/></svg>
        </button>
      </div>

      <div class="progress-wrap">
        <span class="time-label" id="current-time">0:00</span>
        <div id="progress-bar" class="progress-bar-track" role="slider"
             aria-label="Playback position" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
             tabindex="0">
          <div id="progress-filled" class="progress-bar-fill"></div>
          <div id="progress-thumb" class="progress-thumb"></div>

    </div>

    <div class="player-right desktop-only">

          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </span>
        <input id="volume-slider" type="range" min="0" max="100" value="75"
               aria-label="Volume" autocomplete="off" />
      </div>
      <button id="expand-btn" aria-label="Immersive mode" title="Immersive mode (E)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>
  </footer>

</div><!-- #app -->

<script type="module" src="./js/app.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

  // ── Register Service Worker ──────────────────────────────────────────────
  // BUG-018 FIX: removed the redundant postMessage('skipWaiting') call.
  // sw.js already calls self.skipWaiting() in its 'install' event, so any new
  // SW version takes over immediately without waiting. The updatefound +
  // statechange handler that sent the postMessage was therefore dead code —
  // by the time 'installed' fired, skipWaiting had already run, meaning the
  // message was sent to a SW that had already skipped waiting on its own.
  // Removing it eliminates the double-skip and simplifies the registration.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .catch(err => console.warn('[SW] Registration failed:', err));
  }

  // ── Expand overlay delegates ─────────────────────────────────────────────
  document.getElementById('expand-prev')?.addEventListener('click', () =>
    document.getElementById('prev-btn')?.click());
  document.getElementById('expand-next')?.addEventListener('click', () =>
    document.getElementById('next-btn')?.click());
  document.getElementById('expand-play-btn')?.addEventListener('click', () =>
    document.getElementById('play-pause-btn')?.click());
  document.getElementById('expand-btn-mobile')?.addEventListener('click', () =>
    document.getElementById('expand-btn')?.click());

  // ── Unified progress seek helper ─────────────────────────────────────────
  function getSeekPct(e, barEl) {
    const rect = barEl.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  }

  function bindSeekBar(barId) {
    const bar = document.getElementById(barId);
    if (!bar) return;

    let dragging = false;

    function doSeek(pct) {
      document.dispatchEvent(new CustomEvent('dhyaan:seek', { detail: { pct } }));
    }

    function updateVisual(pct) {
      const fillId  = barId === 'progress-bar' ? 'progress-filled' : 'expand-filled';
      const thumbId = barId === 'progress-bar' ? 'progress-thumb'  : 'expand-thumb';
      const fill  = document.getElementById(fillId);
      const thumb = document.getElementById(thumbId);
      const pctStr = `${(pct * 100).toFixed(2)}%`;
      if (fill)  fill.style.width = pctStr;
      if (thumb) thumb.style.left = pctStr;
    }

    bar.addEventListener('mousedown', (e) => {
      e.preventDefault();
      dragging = true;
      bar.classList.add('dragging');
      document.dispatchEvent(new CustomEvent('dhyaan:drag-start'));
      updateVisual(getSeekPct(e, bar));
    });
    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      updateVisual(getSeekPct(e, bar));
    });
    document.addEventListener('mouseup', (e) => {
      if (!dragging) return;
      dragging = false;
      bar.classList.remove('dragging');
      const pct = getSeekPct(e, bar);
      updateVisual(pct);
      doSeek(pct);
      document.dispatchEvent(new CustomEvent('dhyaan:drag-end'));
    });

    bar.addEventListener('touchstart', (e) => {
      dragging = true;
      bar.classList.add('dragging');
      document.dispatchEvent(new CustomEvent('dhyaan:drag-start'));
      updateVisual(getSeekPct(e, bar));
    }, { passive: true });
    bar.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      e.preventDefault();
      updateVisual(getSeekPct(e, bar));
    }, { passive: false });
    bar.addEventListener('touchend', (e) => {
      if (!dragging) return;
      dragging = false;
      bar.classList.remove('dragging');
      const touch = e.changedTouches[0];
      const pct = Math.max(0, Math.min(1, (touch.clientX - bar.getBoundingClientRect().left) / bar.offsetWidth));
      updateVisual(pct);
      doSeek(pct);
      document.dispatchEvent(new CustomEvent('dhyaan:drag-end'));
    }, { passive: true });

    bar.addEventListener('keydown', (e) => {
      const current = parseFloat(bar.getAttribute('aria-valuenow') || 0) / 100;
      let pct = current;
      if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
        pct = Math.min(1, current + 0.02); e.preventDefault();
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
        pct = Math.max(0, current - 0.02); e.preventDefault();
      } else if (e.key === 'Home')  { pct = 0; e.preventDefault(); }
      else if  (e.key === 'End')   { pct = 1; e.preventDefault(); }
      else return;
      updateVisual(pct);
      doSeek(pct);
    });
  }

  bindSeekBar('progress-bar');
  bindSeekBar('expand-progress-bar');

  // ── Logo keyboard accessibility ──────────────────────────────────────────
  document.querySelector('.logo')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.currentTarget.click(); }
  });

  // ── Theme dot keyboard accessibility ────────────────────────────────────
  document.querySelectorAll('.theme-dot').forEach(dot => {
    dot.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); dot.click(); }
    });
  });

  // ── Mobile sidebar ───────────────────────────────────────────────────────
  const sidebar      = document.getElementById('sidebar');
  const backdrop     = document.getElementById('mobile-sidebar-backdrop');
  const menuBtn      = document.getElementById('mobile-menu-btn');
  const closeBtn     = document.getElementById('sidebar-close-btn');
  const sidebarHdr   = document.getElementById('sidebar-header-mobile');
  const themePanel   = document.getElementById('mobile-theme-panel');
  const expandMobile = document.getElementById('expand-btn-mobile');

  function isMobile() { return window.innerWidth <= 768; }

  function openSidebar() {
    sidebar.classList.add('open');
    backdrop.classList.add('open');
    backdrop.setAttribute('aria-hidden', 'false');
    menuBtn?.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
    setTimeout(() => {
      const firstFocusable = sidebar.querySelector(
        'button:not([disabled]), [tabindex]:not([tabindex="-1"])'
      );
      (firstFocusable || sidebar).focus({ preventScroll: true });
    }, 400);
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    backdrop.classList.remove('open');
    backdrop.setAttribute('aria-hidden', 'true');
    menuBtn?.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
    menuBtn?.focus({ preventScroll: true });
  }

  function applyMobileUI() {
    const mobile = isMobile();
    closeBtn?.classList.toggle('sidebar-close-btn-hidden', !mobile);
    sidebarHdr?.classList.toggle('sidebar-mobile-header-hidden', !mobile);
    themePanel?.classList.toggle('mobile-theme-panel-hidden', !mobile);
    expandMobile?.classList.toggle('mobile-only-hidden', !mobile);
    if (!mobile) closeSidebar();
  }

  menuBtn?.addEventListener('click', openSidebar);
  closeBtn?.addEventListener('click', closeSidebar);
  backdrop?.addEventListener('click', closeSidebar);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && isMobile() && sidebar.classList.contains('open')) {
      closeSidebar();
    }
  });

  // Swipe left to close sidebar
  let _sidebarTouchStartX = 0;
  sidebar.addEventListener('touchstart', (e) => {
    _sidebarTouchStartX = e.touches[0].clientX;
  }, { passive: true });
  sidebar.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - _sidebarTouchStartX;
    if (dx < -50 && isMobile()) closeSidebar();
  }, { passive: true });

  // ── Mobile theme selection ───────────────────────────────────────────────
  document.querySelectorAll('.mobile-theme-item').forEach(item => {
    const activate = () => {
      const theme = item.dataset.themeMobile;
      if (!theme) return;
      document.querySelector(`[data-theme-btn="${theme}"]`)?.click();
      document.querySelectorAll('.mobile-theme-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      setTimeout(closeSidebar, 280);
    };
    item.addEventListener('click', activate);
    // BUG-022 FIX: keyboard support for the now-accessible role="button" items
    item.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); }
    });
  });

  function syncMobileThemeActive(theme) {
    document.querySelectorAll('.mobile-theme-item').forEach(item => {
      item.classList.toggle('active', item.dataset.themeMobile === theme);
    });
  }

  // BUG-012 FIX: consolidated into a single MutationObserver handling both
  // mobile theme highlight sync and meta theme-color update.
  const themeColors = {
    'zen-dark': '#0a0f0d', 'night-blue': '#080b14', 'cosmic-purple': '#0a080f',
    'forest-calm': '#050e08', 'spiritual-green': '#080e0a', 'sunset-gold': '#0f0b04',
    'rose-pink': '#0f080d', 'moonlight': '#08090c',
  };
  const themeColorMeta = document.querySelector('meta[name="theme-color"]:not([media])');

  new MutationObserver(() => {
    const theme = document.body.getAttribute('data-theme');
    if (!theme) return;
    syncMobileThemeActive(theme);
    if (themeColorMeta && themeColors[theme]) {
      themeColorMeta.setAttribute('content', themeColors[theme]);
    }
  }).observe(document.body, { attributes: true, attributeFilter: ['data-theme'] });

  syncMobileThemeActive(document.body.getAttribute('data-theme') || 'zen-dark');

  applyMobileUI();
  window.addEventListener('resize', applyMobileUI);

  // ── Expand overlay: tap to show/hide controls on mobile ─────────────────
  const expandOverlay = document.getElementById('expand-overlay');
  expandOverlay?.addEventListener('click', (e) => {
    if (!isMobile()) return;
    const isControl = e.target.closest('button, .expand-progress-bar, .expand-reco-item');
    if (!isControl) document.body.classList.toggle('controls-visible');
  });

  // ── Prevent pull-to-refresh on expand overlay ───────────────────────────
  expandOverlay?.addEventListener('touchmove', (e) => {
    if (!e.target.closest('.expand-reco-list')) e.preventDefault();
  }, { passive: false });

});
</script>

</body>
