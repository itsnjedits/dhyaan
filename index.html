<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dhyaan — A living meditation experience. Immersive ambient soundscapes for deep focus, healing, and stillness." />
  <meta name="theme-color" content="#0a0f0d" />
  <title>Dhyaan — A Living Meditation Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="./css/main.css" />
</head>
<body data-theme="zen-dark">

<!-- Ambient canvas -->
<canvas id="particle-canvas" aria-hidden="true"></canvas>

<!-- ── Expand mode overlay ───────────────────────────────────────────────── -->
<div id="expand-overlay" role="dialog" aria-label="Immersive player" aria-modal="true">
  <img id="expand-image" src="" alt="Album art" />
  <div class="expand-gradient"></div>

  <button id="collapse-btn" aria-label="Exit immersive mode" title="Exit (Esc)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
  </button>

  <div class="expand-ui">
    <div class="expand-track-info">
      <div id="expand-title">―</div>
      <div id="expand-moods"></div>
    </div>

    <div class="expand-progress-wrap">
      <span class="expand-time" id="expand-current">0:00</span>
      <div class="expand-progress-bar" id="expand-progress-bar">
        <div id="expand-filled"></div>
      </div>
      <span class="expand-time" id="expand-duration">0:00</span>
    </div>

    <div class="expand-controls">
      <button class="expand-ctrl-btn" id="expand-prev" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button id="expand-play-btn" aria-label="Play / Pause">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="expand-ctrl-btn" id="expand-next" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ── Main app ──────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Header -->
  <header id="header">
    <div class="logo">
      <span class="logo-glyph">☸</span>
      <span>Dhyaan</span>
    </div>

    <div class="header-controls">
      <!-- Search -->
      <div class="search-wrap">
        <span class="search-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </span>
        <input id="search-input" type="search" placeholder="Search tracks, moods…" autocomplete="off" spellcheck="false" />
        <button id="search-clear" aria-label="Clear search">✕</button>
      </div>

      <!-- Theme switcher -->
      <div class="theme-switcher" aria-label="Theme selector">
        <div class="theme-dot" data-theme-btn="zen-dark" title="Zen Dark" role="button" tabindex="0"></div>
        <div class="theme-dot" data-theme-btn="night-blue" title="Night Blue" role="button" tabindex="0"></div>
        <div class="theme-dot" data-theme-btn="cosmic-purple" title="Cosmic Purple" role="button" tabindex="0"></div>
        <div class="theme-dot" data-theme-btn="forest-calm" title="Forest Calm" role="button" tabindex="0"></div>
        <div class="theme-dot" data-theme-btn="spiritual-green" title="Spiritual Green" role="button" tabindex="0"></div>
        <div class="theme-dot" data-theme-btn="sunset-gold" title="Sunset Gold" role="button" tabindex="0"></div>
        <div class="theme-dot" data-theme-btn="rose-pink" title="Rose Pink" role="button" tabindex="0"></div>
        <div class="theme-dot" data-theme-btn="moonlight" title="Moonlight Silver" role="button" tabindex="0"></div>
      </div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">
        <span>Playlists</span>
        <button id="new-playlist-btn" aria-label="New playlist">+ New</button>
      </div>
      <div id="playlists-container"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label"><span>Keyboard</span></div>
      <div class="keys-hint">
        <span class="key-item"><kbd>Space</kbd> Play</span>
        <span class="key-item"><kbd>←/→</kbd> Seek</span>
        <span class="key-item"><kbd>↑/↓</kbd> Vol</span>
        <span class="key-item"><kbd>N</kbd> Next</span>
        <span class="key-item"><kbd>P</kbd> Prev</span>
        <span class="key-item"><kbd>E</kbd> Expand</span>
        <span class="key-item"><kbd>Esc</kbd> Close</span>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main id="main">
    <!-- Mood pills -->
    <div id="mood-pills" role="group" aria-label="Filter by mood"></div>

    <!-- Track grid -->
    <div id="track-list" role="list" aria-label="Meditation tracks">
      <div class="empty-state">Loading stillness…</div>
    </div>
  </main>

  <!-- Player bar -->
  <footer id="player">
    <!-- Now playing -->
    <div class="np-info">
      <div class="np-thumb">
        <img id="np-image" src="" alt="Now playing" />
      </div>
      <div class="np-text">
        <div id="np-title">Select a track</div>
        <div id="np-moods">―</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="player-controls">
      <div class="ctrl-btns">
        <!-- Shuffle -->
        <button class="ctrl-btn" id="shuffle-btn" aria-label="Shuffle" title="Shuffle">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>

        <!-- Seek back -->
        <button class="ctrl-btn seek-btn" id="seek-bwd" aria-label="Seek back 10s" title="−10s">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
          <span>10</span>
        </button>

        <!-- Previous -->
        <button class="ctrl-btn" id="prev-btn" aria-label="Previous track">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>

        <!-- Play/Pause -->
        <button id="play-pause-btn" aria-label="Play / Pause">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <!-- Next -->
        <button class="ctrl-btn" id="next-btn" aria-label="Next track">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>

        <!-- Seek forward -->
        <button class="ctrl-btn seek-btn" id="seek-fwd" aria-label="Seek forward 10s" title="+10s">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
          <span>10</span>
        </button>

        <!-- Repeat -->
        <button class="ctrl-btn" id="repeat-btn" aria-label="Repeat" title="Repeat">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>

        <!-- Random -->
        <button class="ctrl-btn" id="random-btn" aria-label="Random meditation" title="Random track">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="2.5"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8 0-1.85.63-3.55 1.69-4.9L16.9 18.31C15.55 19.37 13.85 20 12 20zm6.31-3.1L7.1 5.69C8.45 4.63 10.15 4 12 4c4.42 0 8 3.58 8 8 0 1.85-.63 3.55-1.69 4.9z"/></svg>
        </button>
      </div>

      <!-- Progress bar -->
      <div class="progress-wrap">
        <span class="time-label" id="current-time">0:00</span>
        <div id="progress-bar" role="slider" aria-label="Playback position" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="progress-filled"></div>
        </div>
        <span class="time-label" id="duration">0:00</span>
      </div>
    </div>

    <!-- Right controls -->
    <div class="player-right">
      <div class="volume-wrap">
        <span class="vol-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </span>
        <input id="volume-slider" type="range" min="0" max="100" value="75" aria-label="Volume" />
      </div>

      <button id="expand-btn" aria-label="Immersive mode" title="Immersive mode (E)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>
  </footer>

</div><!-- #app -->

<script type="module" src="./js/app.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Expand overlay prev/next/play — delegate to main player controls
    document.getElementById('expand-prev')?.addEventListener('click', () =>
      document.getElementById('prev-btn')?.click());
    document.getElementById('expand-next')?.addEventListener('click', () =>
      document.getElementById('next-btn')?.click());
    document.getElementById('expand-play-btn')?.addEventListener('click', () =>
      document.getElementById('play-pause-btn')?.click());

    // Sync expand progress/time/track-info from player via MutationObserver
    const progressFilled = document.getElementById('progress-filled');
    if (progressFilled) {
      const syncUI = () => {
        const w = progressFilled.style.width;
        const expandFilled = document.getElementById('expand-filled');
        if (expandFilled) expandFilled.style.width = w;

        const ct  = document.getElementById('current-time')?.textContent;
        const dur = document.getElementById('duration')?.textContent;
        if (ct)  document.getElementById('expand-current').textContent = ct;
        if (dur) document.getElementById('expand-duration').textContent = dur;

        const title = document.getElementById('np-title')?.textContent;
        const moods = document.getElementById('np-moods')?.textContent;
        if (title) document.getElementById('expand-title').textContent = title;
        if (moods) document.getElementById('expand-moods').textContent = moods;
      };
      new MutationObserver(syncUI).observe(progressFilled, { attributes: true, attributeFilter: ['style'] });
    }

    // Expand progress bar click-to-seek
    document.getElementById('expand-progress-bar')?.addEventListener('click', (e) => {
      const bar = document.getElementById('expand-progress-bar');
      const pct = Math.max(0, Math.min(1, (e.clientX - bar.getBoundingClientRect().left) / bar.offsetWidth));
      document.dispatchEvent(new CustomEvent('dhyaan:seek', { detail: { pct } }));
    });

    // Theme dot keyboard accessibility
    document.querySelectorAll('.theme-dot').forEach(dot => {
      dot.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); dot.click(); }
      });
    });
  });
</script>

</body>
</html>
